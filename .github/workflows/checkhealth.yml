name: checkhealth

on:
  pull_request:
    branches:
      - "*"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "The pull request number to target"
        required: true
        type: string

jobs:
  checkhealth:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - name: generate-token
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
  
      - name: initial-checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
 
      - name: pr-info
        id: pr-info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            PR_DATA=$(gh pr view $PR_NUMBER --json headRefOid)
            COMMIT_SHA=$(echo "$PR_DATA" | jq -r '.headRefOid')
            git checkout "$COMMIT_SHA"
          else
            COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
            echo "Targeting PR triggered automatically."
          fi
          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_ENV
          echo "Targeting commit: $COMMIT_SHA"
      
      - name: install-nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: build
        run: |-
          nix build .#neovim -o neovim_app
          echo "Neovim flake built successfully."

      - name: :checkhealth
        id: checkhealth
        run: |-
          ./neovim_app/bin/nvim --headless +checkhealth +"set buftype=" +"w! checkhealth_output.txt" +"qa!"
          echo "CHECKHEALTH_OUTPUT<<EOF" >> $GITHUB_ENV
          cat checkhealth_output.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: comment
        uses: peter-evans/commit-comment@v4.0.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          repository: ${{ github.repository }}
          sha: ${{ env.COMMIT_SHA }}
          body: |-
            ### Neovim :checkhealth Output
            ```
            ${{ env.CHECKHEALTH_OUTPUT }}
            ```
